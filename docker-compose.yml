services:
  shelve:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_VERSION: ${NODE_VERSION:-22-bookworm-slim}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000
      SHELVE_AUTO_MIGRATE: ${SHELVE_AUTO_MIGRATE:-true}
      SHELVE_DB_WAIT_TIMEOUT_SECONDS: ${SHELVE_DB_WAIT_TIMEOUT_SECONDS:-90}
      DATABASE_URL: ${DATABASE_URL:-}
      DATABASE_URL_FILE: ${DATABASE_URL_FILE:-}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-shelve}
      POSTGRES_USER: ${POSTGRES_USER:-shelve}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      POSTGRES_PASSWORD_FILE: ${POSTGRES_PASSWORD_FILE:-}
      NUXT_SESSION_PASSWORD: ${NUXT_SESSION_PASSWORD:-}
      NUXT_SESSION_PASSWORD_FILE: ${NUXT_SESSION_PASSWORD_FILE:-}
      NUXT_PRIVATE_ENCRYPTION_KEY: ${NUXT_PRIVATE_ENCRYPTION_KEY:-}
      NUXT_PRIVATE_ENCRYPTION_KEY_FILE: ${NUXT_PRIVATE_ENCRYPTION_KEY_FILE:-}
      NUXT_OAUTH_GITHUB_CLIENT_ID: ${NUXT_OAUTH_GITHUB_CLIENT_ID:-}
      NUXT_OAUTH_GITHUB_CLIENT_SECRET: ${NUXT_OAUTH_GITHUB_CLIENT_SECRET:-}
      NUXT_OAUTH_GITHUB_CLIENT_SECRET_FILE: ${NUXT_OAUTH_GITHUB_CLIENT_SECRET_FILE:-}
      NUXT_OAUTH_GOOGLE_CLIENT_ID: ${NUXT_OAUTH_GOOGLE_CLIENT_ID:-}
      NUXT_OAUTH_GOOGLE_CLIENT_SECRET: ${NUXT_OAUTH_GOOGLE_CLIENT_SECRET:-}
      NUXT_OAUTH_GOOGLE_CLIENT_SECRET_FILE: ${NUXT_OAUTH_GOOGLE_CLIENT_SECRET_FILE:-}
      NUXT_PRIVATE_GITHUB_PRIVATE_KEY: ${NUXT_PRIVATE_GITHUB_PRIVATE_KEY:-}
      NUXT_PRIVATE_GITHUB_PRIVATE_KEY_FILE: ${NUXT_PRIVATE_GITHUB_PRIVATE_KEY_FILE:-}
      NUXT_PRIVATE_RESEND_API_KEY: ${NUXT_PRIVATE_RESEND_API_KEY:-}
      NUXT_PRIVATE_RESEND_API_KEY_FILE: ${NUXT_PRIVATE_RESEND_API_KEY_FILE:-}
      NUXT_PRIVATE_RESEND_WEBHOOK_SECRET: ${NUXT_PRIVATE_RESEND_WEBHOOK_SECRET:-}
      NUXT_PRIVATE_RESEND_WEBHOOK_SECRET_FILE: ${NUXT_PRIVATE_RESEND_WEBHOOK_SECRET_FILE:-}
      NUXT_PRIVATE_SENDER_EMAIL: ${NUXT_PRIVATE_SENDER_EMAIL:-}
      NUXT_PRIVATE_ADMIN_EMAILS: ${NUXT_PRIVATE_ADMIN_EMAILS:-}
      NUXT_PRIVATE_ALLOWED_ORIGINS: ${NUXT_PRIVATE_ALLOWED_ORIGINS:-}
      NUXT_PUBLIC_GITHUB_APP_NAME: ${NUXT_PUBLIC_GITHUB_APP_NAME:-}
    expose:
      - "3000"
    networks:
      - dokploy
      - shelve-db
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shelve}
      POSTGRES_USER: ${POSTGRES_USER:-shelve}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      POSTGRES_PASSWORD_FILE: ${POSTGRES_PASSWORD_FILE:-}
    volumes:
      - shelve-postgres-data:/var/lib/postgresql/data
    networks:
      - shelve-db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10

networks:
  dokploy:
    external: true
    name: ${DOKPLOY_NETWORK:-dokploy-network}
  shelve-db:
    internal: true

volumes:
  shelve-postgres-data:
